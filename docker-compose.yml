services:
  postgres:
    image: postgres:16-alpine
    container_name: inf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mission_control}
      POSTGRES_USER: ${DB_USERNAME:-inf_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inf_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-inf_user} -d ${DB_DATABASE:-mission_control}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: inf-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    mem_limit: 512m
    memswap_limit: 512m
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: inf-app
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./.env.production:/var/www/html/.env:ro
      - public_shared:/var/www/html/public-shared
      - app_storage:/var/www/html/storage
    networks:
      - internal

  scheduler:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: inf-scheduler
    restart: unless-stopped
    command: ["/bin/sh", "-c", "while true; do php artisan schedule:run --verbose; sleep 60; done"]
    mem_limit: 256m
    memswap_limit: 256m
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.env.production:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
    networks:
      - internal

  queue:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: inf-queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--queue=default", "--sleep=3", "--tries=3", "--max-time=3600"]
    mem_limit: 512m
    memswap_limit: 512m
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.env.production:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
    networks:
      - internal

  email-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: inf-email-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--queue=email", "--sleep=5", "--tries=2", "--max-time=3600"]
    mem_limit: 256m
    memswap_limit: 256m
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.env.production:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
    networks:
      - internal

  scraper:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: inf-scraper
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--queue=scraper", "--sleep=5", "--tries=1", "--max-jobs=50", "--max-time=3600"]
    mem_limit: 512m
    memswap_limit: 512m
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.env.production:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
    networks:
      - internal

  content-scraper:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: inf-content-scraper
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--queue=content-scraper", "--sleep=5", "--tries=1", "--memory=256", "--max-time=14400"]
    mem_limit: 512m
    memswap_limit: 512m
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'queue:work' | grep -v grep || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
    volumes:
      - ./.env.production:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
    networks:
      - internal

  content-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: inf-content-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--queue=content", "--sleep=3", "--tries=2", "--timeout=600", "--memory=512"]
    mem_limit: 512m
    memswap_limit: 512m
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.env.production:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
    networks:
      - internal

  publication-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: inf-publication-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--queue=publication", "--sleep=5", "--tries=5", "--timeout=120", "--memory=256"]
    mem_limit: 512m
    memswap_limit: 512m
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.env.production:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
    networks:
      - internal

  nginx-api:
    image: nginx:alpine
    container_name: inf-nginx-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./deploy/nginx-api.conf:/etc/nginx/conf.d/default.conf:ro
      - public_shared:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    container_name: inf-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:80"
    depends_on:
      - nginx-api
    networks:
      - internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  public_shared:
    driver: local

networks:
  internal:
    driver: bridge
