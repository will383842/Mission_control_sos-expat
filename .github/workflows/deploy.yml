name: Deploy to Production

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /opt/influenceurs-tracker

            # Backup .env.production before pull (protect secrets)
            cp .env.production .env.production.bak 2>/dev/null || true

            # Stash any local changes (production hotfixes, etc.)
            git stash --include-untracked 2>/dev/null || true

            # Pull latest code (support main or master branch)
            BRANCH=$(git remote show origin | grep 'HEAD branch' | awk '{print $NF}')
            git fetch origin $BRANCH
            git checkout $BRANCH
            git reset --hard origin/$BRANCH

            # Restore .env.production (in case git removed it after gitignore change)
            cp .env.production.bak .env.production 2>/dev/null || true

            # Rebuild and restart containers (including new content + publication workers)
            docker compose build --no-cache app queue scheduler scraper frontend content-worker publication-worker

            # Stop services first (avoid --force-recreate which creates random container names)
            docker compose stop app queue scheduler scraper frontend nginx-api content-worker publication-worker

            # Bring everything up cleanly (correct names, remove orphans)
            docker compose up -d --remove-orphans

            # Wait for app container to be ready
            sleep 5

            # Regenerate Composer autoloader (discover new classes after git pull)
            docker exec inf-app composer dump-autoload --optimize --no-dev

            # Clear Laravel caches
            docker exec inf-app php artisan optimize:clear
            docker exec inf-app php artisan optimize

            # Run migrations (safe — only runs pending)
            docker exec inf-app php artisan migrate --force

            # Seed contact types + email templates (updateOrInsert — safe to re-run)
            docker exec inf-app php artisan db:seed --class=ContactTypeSeeder --force
            docker exec inf-app php artisan db:seed --class=EmailTemplateSeeder --force

            # Seed Content Engine defaults (prompts, presets, publishing endpoint)
            docker exec inf-app php artisan db:seed --class=PromptTemplateSeeder --force
            docker exec inf-app php artisan db:seed --class=GenerationPresetSeeder --force
            docker exec inf-app php artisan db:seed --class=PublishingEndpointSeeder --force

            # Seed affiliate programs (insertOrIgnore — safe to re-run)
            docker exec inf-app php artisan db:seed --class=AffiliateProgramSeeder --force

            # Seed Content Engine Phase 2 data (insertOrIgnore — safe to re-run)
            docker exec inf-app php artisan db:seed --class=KeywordTemplatesSeeder --force
            docker exec inf-app php artisan db:seed --class=ComparativeSeoSeeder --force
            docker exec inf-app php artisan db:seed --class=AffiliateComparativeSeeder --force
            docker exec inf-app php artisan db:seed --class=NativeKeywordsSeeder --force

            # Run keyword cleanup analysis (dry-run — writes report to logs)
            docker exec inf-app php artisan keywords:clean-duplicates || true

            # Score brand content (dry-run — writes report to logs)
            docker exec inf-app php artisan content:score-brand || true

            # Hreflang audit (report only)
            docker exec inf-app php artisan seo:hreflang-audit || true

            # Verify deployment
            docker exec inf-app php artisan about || true

            echo "Deploy complete: $(date)"
