name: Clear MC app cache

# Purge le cache Laravel sur MC (landing canonical_url lookups cachés 6h).
# À lancer après UPDATE DB sur landing_pages pour que les nouveaux slugs/
# canonical_urls soient servis sans attendre 6h.

on:
  workflow_dispatch:

jobs:
  clear:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: SSH MC + clear
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/influenceurs-tracker
            echo "=== MC cache clear ==="
            docker exec inf-app php artisan cache:clear 2>&1 | tail -3
            docker exec inf-app php artisan config:clear 2>&1 | tail -3
            docker exec inf-app php artisan route:clear 2>&1 | tail -3
            docker exec inf-app php artisan view:clear 2>&1 | tail -3
            echo "MC cache cleared."
