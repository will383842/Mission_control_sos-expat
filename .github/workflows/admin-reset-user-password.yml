name: Admin — Reset Mission Control user password

# Workflow declenche manuellement depuis GitHub UI ou via gh CLI :
# https://github.com/will383842/Mission_control_sos-expat/actions/workflows/admin-reset-user-password.yml
#
# SSH to the VPS and runs `php artisan tinker --execute=` to update the
# password (bcrypt) for a given email in the users table.
#
# Reuses existing SSH secrets (SERVER_HOST, SSH_USER, SSH_PRIVATE_KEY).
#
# WARNING : the new password is visible in the run logs (input value).
# After running, the user MUST change it manually via Mission Control UI.

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Email of the user whose password to reset"
        required: true
        type: string
      new_password:
        description: "New password (>= 8 chars). Will be bcrypt-hashed by Laravel."
        required: true
        type: string

jobs:
  reset:
    name: Reset password on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: SSH to VPS and update user password via tinker
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: TARGET_EMAIL,NEW_PASSWORD
          script: |
            set -e
            cd /opt/influenceurs-tracker

            echo "=== Looking up user $TARGET_EMAIL ==="
            EXISTS=$(docker exec inf-app php artisan tinker --execute="echo \\App\\Models\\User::where('email', '$TARGET_EMAIL')->count();" 2>/dev/null | tail -1)

            if [ "$EXISTS" = "0" ]; then
              echo "ERROR : no user found with email $TARGET_EMAIL"
              echo ""
              echo "Available users (first 10) :"
              docker exec inf-app php artisan tinker --execute="\\App\\Models\\User::select('id','email','name')->take(10)->get()->each(function(\$u){ echo \$u->id.' - '.\$u->email.' - '.\$u->name.PHP_EOL; });" 2>/dev/null
              exit 1
            fi

            echo "User found. Updating password..."
            docker exec -e NEW_PASSWORD="$NEW_PASSWORD" inf-app php artisan tinker --execute="\\App\\Models\\User::where('email', '$TARGET_EMAIL')->update(['password' => bcrypt(getenv('NEW_PASSWORD'))]); echo 'Password updated for $TARGET_EMAIL';" 2>&1

            echo ""
            echo "=== DONE — user can now log in with the new password ==="
            echo "REMINDER : the new password should be changed via the Mission Control UI"
            echo "ASAP because it has been transmitted through workflow inputs (logged)."
        env:
          TARGET_EMAIL: ${{ inputs.email }}
          NEW_PASSWORD: ${{ inputs.new_password }}
